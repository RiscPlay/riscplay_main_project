<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" data-bs-core="modern" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 HEX API</title>

  <script src="alpinejs.js" defer></script>

  <!-- Halfmoon CSS -->
  <link href="halfmoon.min.css" rel="stylesheet">

  <!-- Halfmoon modern core theme -->
  <link href="halfmoon.modern.css" rel="stylesheet">
  <script src="halfmoon.min.js"></script>

  <script src="htmx.min.js" defer></script>

</head>

<body x-data="App()">

  <div class="page-wrapper">
    <div class="container px-3 px-sm-4 px-xl-5">
      <div class="row">
        <div class="col py-3 py-sm-4">
          <h1>Control PlayRisc Processor</h1>
        </div>
      </div>
      <div class="row">
        <div class="col" hx-get="upload_memory.html" hx-trigger="load">
        </div>
      </div>
      <div class="row py-5">
        <div class="col" hx-get="view_memory_v2.html" hx-trigger="load">
        </div>
      </div>
      <div class="row py-1">
        <div class="col" hx-get="edit_sdram.html" hx-trigger="load">
        </div>
      </div>
      <div class="row py-1">
        <div class="col" hx-get="upload_img.html" hx-trigger="load">
        </div>
      </div>
    </div>
  </div>
  <script>
    var addr_serv = ""

    function toHex32(value) {
      return (value >>> 0).toString(16).padStart(8, "0");
    }

    function split512(str) {
      let chunks = [];

      for (let i = 0; i < str.length; i += 512) {
        chunks.push(str.slice(i, i + 512));
      }

      return chunks;
    }

    function formatSignedFixed16bits(num) {
      const sign = num >= 0 ? '+' : '-';
      const abs = Math.abs(Math.trunc(num));

      return sign + String(abs).padStart(5, '0');;
    }

    function formatSignedFixed8bits(num) {
      const sign = num >= 0 ? '+' : '-';
      const abs = Math.abs(Math.trunc(num));

      return sign + String(abs).padStart(3, '0');
    }

    function hexToSigned16Pair(hexStr) {
      var hexStr2 = hexStr[7] + hexStr[8] + hexStr[5] + hexStr[6] + "_" + hexStr[2] + hexStr[3] + hexStr[0] + hexStr[1];
      // Remove underscore if present
      hexStr2 = hexStr2.replace(/_/g, '');

      // Parse as 32-bit unsigned number
      const value = parseInt(hexStr2, 16) >>> 0;

      // Extract high and low 16 bits
      let high = (value >>> 16) & 0xFFFF;
      let low = value & 0xFFFF;

      // Convert to signed 16-bit
      if (high & 0x8000) high -= 0x10000;
      if (low & 0x8000) low -= 0x10000;

      return {
        high: formatSignedFixed16bits(high),
        low: formatSignedFixed16bits(low)
      };
    }

    function hexToSigned8Array(hexStr) {
      // Remove underscores
      var hexStr2 = hexStr[7] + hexStr[8] + hexStr[5] + hexStr[6] + "_" + hexStr[2] + hexStr[3] + hexStr[0] + hexStr[1];

      hexStr2 = hexStr2.replace(/_/g, '');

      // Parse as 32-bit unsigned
      const value = parseInt(hexStr2, 16) >>> 0;

      // Extract 4 bytes (big-endian order)
      let bytes = [
        (value >>> 24) & 0xFF,
        (value >>> 16) & 0xFF,
        (value >>> 8) & 0xFF,
        value & 0xFF
      ];

      // Convert each to signed 8-bit
      return bytes.map(b => (b & 0x80) ? formatSignedFixed8bits(b - 0x100) : formatSignedFixed8bits(b));
    }
    async function send_64_words_32bits_to_sdram_buffer(data) {
      var addr_hex_to_set_buffer = toHex32((1 << 22) + (0x101 << 13)); //0b11000000010000000000000
      var addr_hex_to_set_buffer_hex32 = toHex32(addr_hex_to_set_buffer);
      var data_to_send = ""
      for (let j = 0; j < data.length; j++) {
        data_to_send = data_to_send + toHex32(data[j])
      }
      try {
        var response = await fetch(addr_serv + "/send_data", {
          method: "POST",
          body: addr_hex_to_set_buffer + data_to_send
        });
        return true;
      } catch {
        return false;
      }
    }
    async function send_buffer_to_sdram(length, addr_sdram) {
      var op_write = 1;
      var data_len = length;
      var data_to_send = toHex32((addr_sdram << 9) + (data_len << 2) + op_write);
      addr_hex_to_set_buffer = toHex32((1 << 22) + (1 << 21));
      try {
        var response = await fetch(addr_serv + "/send_data", {
          method: "POST",
          body: addr_hex_to_set_buffer + data_to_send
        });
        return true;
      } catch {
        return false;
      }
    }

    function App() {
      return {
        hex: "",
        file_name_sel: "",
        addr_of_the_memory_to_watch: "",
        amount_to_read: "",
        error: false,
        memory: [],
        display_format: "hexadecimal__format___little_endian",
        highlight_addr: "",
        last_memory_addr_that_user_sent_to_get_memory: 0,
        sdram_buffer_write: new Array(64).fill(0),
        sdram_addr_to_write_buffer: "000000",
        sdram_addr_to_read: "000000",
        img_to_send: null,
        img_words_sent:-1,
        img_total_words:-1,
        memory_view: {
          "mem": []
        },
        highlight_pos: 0,
        format_memory(highlight_pos) {
          var cells = [];
          var word_32bits_hexa = ""
          var memory_address_of_the_word = this.last_memory_addr_that_user_sent_to_get_memory;
          for (let i = 0; i < this.memory.length; i++) {
            word_32bits_hexa = word_32bits_hexa + this.memory[i];
            if (word_32bits_hexa.length == 4)
              word_32bits_hexa = word_32bits_hexa + "_";
            if (word_32bits_hexa.length == 9) {
              var style = "cursor: pointer; white-space: nowrap;   display: inline-block;"
              if (cells.length % 2 == 0)
                var cell_class = "text-body";
              else
                var cell_class = "text-body-secondary";
              if (cells.length == highlight_pos) {
                cell_class = " text-black";
                style = style + " background-color: var(--bs-lightgray-200); "
              }

              style = style + " margin-right:2ch; margin-left:2ch;"
              var sixteen_bits_signed = hexToSigned16Pair(word_32bits_hexa);
              var eight_bits_signed = hexToSigned8Array(word_32bits_hexa);
              var word_32bits_hexa___little_endian = word_32bits_hexa[7] + word_32bits_hexa[8] + word_32bits_hexa[5] +
                word_32bits_hexa[6] + "_" + word_32bits_hexa[2] + word_32bits_hexa[3] + word_32bits_hexa[0] +
                word_32bits_hexa[1];

              cells.push({
                "hexadecimal__format___little_endian": word_32bits_hexa___little_endian,
                "hexadecimal__format___big_endian": word_32bits_hexa,
                "sixteenbits_signed__format": sixteen_bits_signed.low + "  " + sixteen_bits_signed.high,
                "eightbits_signed__format": eight_bits_signed[0] + "  " + eight_bits_signed[1] + "  " +
                  eight_bits_signed[2] + "  " + eight_bits_signed[3],
                "class": cell_class,
                "style": style,
                "memory_address_of_the_word": memory_address_of_the_word
              });
              memory_address_of_the_word = memory_address_of_the_word + 1;
              word_32bits_hexa = "";
            }
          }
          this.memory_view.mem = cells
          this.highlight_pos = highlight_pos;
          this.highlight_addr = cells[highlight_pos].memory_address_of_the_word.toString(16);;
        },
        movehighlight(inc_highlight_pos) {
          if ((this.highlight_pos + inc_highlight_pos) >= 0 && (this.highlight_pos + inc_highlight_pos) < this
            .memory_view.mem.length)
            this.format_memory(this.highlight_pos + inc_highlight_pos);
        },
        async loadfile(event) {
          const file = event.target.files[0];
          this.file_name_sel = file ? file.name : "File don't selected";
          const buffer = await file.arrayBuffer();
          const bytes = new Uint8Array(buffer);

          let hex = "";
          for (let b of bytes) {
            hex += b.toString(16).padStart(2, "0");
          }

          this.hex = hex;
        },
        async sendBuffer() {
          this.sdram_addr_to_write_buffer;
          var addr_sdram = parseInt(this.sdram_addr_to_write_buffer, 16);
          var sdram_buffer_write_int=new Uint32Array(this.sdram_buffer_write.length);
          for(let i=0;i<this.sdram_buffer_write.length;i++){
            sdram_buffer_write_int[i]=parseInt(this.sdram_buffer_write[i], 16);
          }

          if (!await send_64_words_32bits_to_sdram_buffer(sdram_buffer_write_int)) {
            this.error = true;
            return;
          }
          if (!await send_buffer_to_sdram(this.sdram_buffer_write.length, addr_sdram)) {
            this.error = true;
            return;
          }
        },
        async getSDRAM() {

          var op_read = 0;
          var data_len = this.sdram_buffer_write.length;
          var addr_sdram = parseInt(this.sdram_addr_to_read, 16);
          var data_to_send = toHex32((addr_sdram << 9) + (data_len << 2) + op_read);
          addr_hex_to_set_buffer = toHex32((1 << 22) + (1 << 21));
          try {
            var response = await fetch(addr_serv + "/send_data", {
              method: "POST",
              body: addr_hex_to_set_buffer + data_to_send
            });
          } catch {
            this.error = true;
            return;
          }
        },
        async sendFile() {


          this.error = false;
          try {
            var response = await fetch(addr_serv + "/stop_processor", {
              method: "GET",
            });
          } catch {
            this.error = true;
            return;
          }
          var code = response.status;
          if (code != 200) {
            this.error = true;
            return;
          }

          var addr = 0x20000000;
          var chuncks = split512(this.hex);

          for (let i = 0; i < chuncks.length; i++) {
            var addr_hex = toHex32(addr + (i * 64));
            try {
              var response = await fetch(addr_serv + "/send_data", {
                method: "POST",
                body: addr_hex + chuncks[i]
              });
            } catch {
              this.error = true;
              return;
            }
            var code = response.status;
            if (code != 200) {
              this.error = true;
              return;
            }

            try {
              var response = await fetch(addr_serv + "/enable_processor", {
                method: "GET",
              });
            } catch {
              this.error = true;
              return;
            }
            var code = response.status;
            if (code != 200) {
              this.error = true;
              return;
            }
          }
        },
        async recvData() {
          var total_recv = 0;
          this.memory = [];
          var initial_addr = this.addr_of_the_memory_to_watch;
          this.last_memory_addr_that_user_sent_to_get_memory = parseInt(this.addr_of_the_memory_to_watch, 16);
          while (true) {
            var total_to_req = 0;
            if ((this.amount_to_read - total_recv) > 64) total_to_req = 64;
            else total_to_req = this.amount_to_read - total_recv;
            const res = await fetch(addr_serv + "/recv_data?n=" + (total_to_req * 4) + "&addr=" + initial_addr);
            total_recv = total_to_req + total_recv;
            const buffer = await res.arrayBuffer();

            const bytes = new Uint8Array(buffer);

            const hex = Array.from(bytes).map(b =>
              b.toString(16).padStart(2, '0').toUpperCase()
            );
            for (let i = 0; i < hex.length; i++)
              this.memory.push(hex[i]);
            initial_addr = (parseInt(initial_addr, 16) + 64).toString(16).toUpperCase();
            if (total_recv == this.amount_to_read) break;
          }
          this.format_memory(0);
        },
        async loadIMG(e) {
          const file = e.target.files[0];
          if (!file) return;

          const img = new Image();
          img.src = URL.createObjectURL(file);

          await img.decode();
          const canvas = document.getElementById("myCanvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 640;
          canvas.height = 360;
          ctx.drawImage(img, 0, 0, 640, 360);

          const imageData = ctx.getImageData(0, 0, 640, 360);
          const pixels = imageData.data;
          const framebuffer = new Uint32Array(230400); //(640*360)

          for (let i = 0; i < pixels.length; i += 4) {
            framebuffer[Math.floor(i / 4)] = (pixels[i] << 16) | (pixels[i+1] << 8) | (pixels[i+2]);
          }
          this.img_to_send = framebuffer;
        },
        async sendIMG() {
          this.img_total_words=this.img_to_send.length
          for (let i = 0; i < this.img_to_send.length; i = i + 64) {

            var data_to_send=this.img_to_send.slice(i, i + 64)
            if (!await send_64_words_32bits_to_sdram_buffer(data_to_send)) {
              this.error = true;
              console.log("error");
              return;
            }
            if (!await send_buffer_to_sdram(data_to_send.length, i)) {
              this.error = true;
              console.log("error");
              return;
            }
            this.img_words_sent=this.img_words_sent+64;
          }
        }
      }
    }
  </script>
  <script src="bootstrap.bundle.min.js"></script>
</body>

</html>
